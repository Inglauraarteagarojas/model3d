<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Mi Planta de Café en VR/AR</title>
    <!-- Librería principal de A-Frame -->
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <!-- Opcional: Para estadísticas de rendimiento (fps) y depuración -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <!-- Escena principal con soporte para VR y AR -->
    <a-scene vr-mode-ui="enabled: true" background="color: #111122">
      
      <!-- Cámara y controles por defecto (incluye el botón "Enter VR") -->
      <a-camera position="0 1.6 5"></a-camera>
      
      <!-- MODELO: TU PLANTA DE CAFÉ (ajustada posición y escala) -->
      <!-- El archivo "planta_cafe.glb" debe estar en la MISMA CARPETA que este HTML -->
      <a-entity 
        gltf-model="url(result.glb)" 
        position="0 1.2 -2" 
        scale="2 2 2" 
        rotation="0 45 0"
        animation="property: rotation; to: 0 405 0; loop: true; dur: 10000; easing: linear">
      </a-entity>
      
      <!-- SISTEMA DE LUCES MEJORADO para que se vean los detalles -->
      <!-- Luz ambiental suave -->
      <a-light type="ambient" color="#404060"></a-light>
      <!-- Luz principal direccional (como el sol) -->
      <a-light type="directional" position="2 5 3" intensity="1.5" color="#FFF5E6"></a-light>
      <!-- Luz de relleno desde atrás -->
      <a-light type="directional" position="-2 3 -4" intensity="0.5" color="#4466AA"></a-light>
      
      <!-- SUELO: Un plano sutil que refleja un poco -->
      <a-plane 
        position="0 0 -3" 
        rotation="-90 0 0" 
        width="8" 
        height="8" 
        material="color: #2A5A5A; metalness: 0.1; roughness: 0.8; emissive: #112222">
      </a-plane>
      
      <!-- CIELO: Un color degradado suave -->
      <a-sky color="#88AADD"></a-sky>
      
      <!-- TEXTO FLOTANTE (opcional) para identificar la escena -->
      <a-text 
        value="Planta de Cafe" 
        position="-0.8 2.5 -4" 
        color="#FFD966" 
        scale="2 2 2" 
        align="center">
      </a-text>
      
      <!-- CÍRCULO DE LUZ en el suelo (efecto decorativo) -->
      <a-circle 
        position="0 0.01 -2" 
        rotation="-90 0 0" 
        radius="1.5" 
        material="color: #88AA88; transparent: true; opacity: 0.3; side: double">
      </a-circle>
      
      <!-- ESTRELLAS LEJANAS (partículas) para dar ambiente -->
      <a-entity 
        geometry="primitive: sphere; radius: 0.05" 
        material="color: white; emissive: white" 
        position="2 3 -10">
      </a-entity>
      <a-entity 
        geometry="primitive: sphere; radius: 0.03" 
        material="color: #FFDDAA; emissive: #FFAA88" 
        position="-3 4 -12">
      </a-entity>
      <a-entity 
        geometry="primitive: sphere; radius: 0.04" 
        material="color: #AACCFF; emissive: #AACCFF" 
        position="4 2 -15">
      </a-entity>
      
      <!-- INSTRUCCIÓN FLOTANTE para el usuario -->
      <a-text 
        value="¡Funciona en VR y AR! Usa el boton inferior" 
        position="-2 0.8 -5" 
        color="#FFFFFF" 
        width="6" 
        align="left">
      </a-text>
      
    </a-scene>
  </body>
</html>
